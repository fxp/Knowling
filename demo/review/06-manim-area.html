<body>
<main class="kl-doc">
  <header class="kl-header">
    <h1>完全平方公式 (a+b)² 的几何意义</h1>
    <p class="kl-hook">为什么 (a+b)² 不等于 a²+b²？把它画成正方形面积就一目了然。</p>
  </header>
  <div class="kl-deck" data-deck>
    <div class="kl-deck-viewport">
      <div class="kl-deck-track">
<div class="kl-card"><aside class="kl-block kl-callout kl-callout-warning" data-block-id="hook">
  <span class="kl-callout-icon">⚠</span>
  <div class="kl-callout-body"><p><strong>常见错误</strong>：把 <span class="kl-math"><math><msup><mrow><mo fence="true" form="prefix" stretchy="false">(</mo><mi>a</mi><mo>+</mo><mi>b</mi><mo fence="true" form="postfix" stretchy="false">)</mo></mrow><mn>2</mn></msup></math></span> 写成 <span class="kl-math"><math><mrow><msup><mi>a</mi><mn>2</mn></msup><mo>+</mo><msup><mi>b</mi><mn>2</mn></msup></mrow></math></span>。漏掉的 <span class="kl-math"><math><mrow><mn>2</mn><mi>a</mi><mi>b</mi></mrow></math></span> 藏在哪？看下面的面积动画。</p></div>
