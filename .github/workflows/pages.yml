name: Deploy demo gallery to GitHub Pages

# Builds the self-contained Knowling demo gallery (demo/) and publishes it to
# GitHub Pages. The gallery is pure static HTML (no runtime deps); the build
# step only re-renders demo/index.html from the committed specs/components.
# Requires Pages to be enabled once (Settings -> Pages -> Source: GitHub Actions).

on:
  push:
    branches:
      - main
      - claude/math-manim-knowling-integration-jlk8oc
    paths:
      - demo/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Re-render gallery index (model-free)
        run: python3 demo/build.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload demo/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
